# fly.toml app configuration file generated for todolist-backend
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "todolist-backend"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  SERVER_PORT = "8080"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME = "org.postgresql.Driver"
  SPRING_JPA_HIBERNATE_DDL_AUTO = "update"
  SPRING_JPA_SHOW_SQL = "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT = "org.hibernate.dialect.PostgreSQLDialect"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"
    restart_limit = 0
